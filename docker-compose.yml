services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: school-upload-app
    container_name: school-upload-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - uploads_data:/var/www/html/storage/app/uploads
      - uploads_temp:/var/www/html/storage/app/temp
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_BASE_DOMAIN=${APP_BASE_DOMAIN:-localhost}
      - APP_PORT=${APP_PORT:-8080}
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_MASTER_HOST:-mysql_master}
      - DB_PORT=3306
      - DB_DATABASE=schools
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-auto}
      - AWS_BUCKET=${AWS_BUCKET:-default}
      - AWS_ENDPOINT=${AWS_ENDPOINT}
      - AWS_URL=${AWS_URL}
    ports:
      - "8080:80"
    depends_on:
      - mysql_master
      - redis
    networks:
      - school-network

  mysql_master:
    image: mysql:8.2
    container_name: mysql_master
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: schools
    ports:
      - "3307:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - school-network

  redis:
    image: redis:7-alpine
    container_name: school-upload-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - school-network

  # MySQL containers for each school are created dynamically via script
  # See scripts/provision-school.sh

volumes:
  mysql_master_data:
  redis_data:
  uploads_data:
  uploads_temp:

networks:
  school-network:
    driver: bridge
