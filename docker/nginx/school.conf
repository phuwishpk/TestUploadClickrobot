server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9-]+)\.localhost$ localhost;

    root /var/www/html/public;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    charset utf-8;

    # Large file upload support
    client_max_body_size 100G;
    client_body_buffer_size 128M;
    proxy_read_timeout 7200s;
    proxy_connect_timeout 7200s;
    proxy_send_timeout 7200s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Subdomain to Path-based routing (INTERNAL - URL stays the same in browser)
    # bangrak.localhost:8080/teacher/dashboard -> internally routes to /bangrak/teacher/dashboard
    # but URL in browser remains bangrak.localhost:8080/teacher/dashboard

    location / {
        # For subdomain requests (e.g., bangrak.localhost), rewrite to path-based URL internally
        # bangrak.localhost:8080/teacher/dashboard -> /bangrak/teacher/dashboard (internal)
        if ($host ~* ^(?<subdomain>[a-z0-9-]+)\.localhost(:\d+)?$) {
            rewrite ^/(.*)$ /${subdomain}/$1 last;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    error_page 404 /index.php;

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 7200;
        fastcgi_send_timeout 7200;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
